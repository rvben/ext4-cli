name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Install e2fsprogs (macOS)
        if: runner.os == 'macOS'
        run: brew install e2fsprogs
      - name: Generate fixtures
        run: make fixtures
      - run: make lint
      - run: make test
