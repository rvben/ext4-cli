name: release

on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install e2fsprogs (macOS)
        if: runner.os == 'macOS'
        run: brew install e2fsprogs
      - name: Generate fixtures
        run: make fixtures
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: cp target/${{ matrix.target }}/release/ext4 ext4-${{ matrix.target }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ext4-${{ matrix.target }}
